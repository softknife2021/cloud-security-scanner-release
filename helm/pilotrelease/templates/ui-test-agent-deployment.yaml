apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ui-test-agent
  labels:
    {{- include "cloud-security-scanner.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui-test-agent
spec:
  replicas: {{ .Values.uiTestAgent.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: ui-test-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: ui-test-agent
    spec:
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for backend to be ready..."
              until wget -q --spider http://{{ .Release.Name }}-backend:{{ .Values.backend.port }}/actuator/health 2>/dev/null; do
                sleep 5
              done
              echo "Backend is ready!"
      containers:
        # Selenium Chrome standalone
        - name: selenium-chrome
          image: selenium/standalone-chrome:latest
          ports:
            - containerPort: 4444
          env:
            - name: SE_NODE_MAX_SESSIONS
              value: "2"
            - name: SE_VNC_NO_PASSWORD
              value: "1"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
        # UI Test Agent
        - name: ui-test-agent
          image: "{{ .Values.uiTestAgent.image | default "softknife/cloud-security-ui-test-agent" }}:{{ .Values.uiTestAgent.tag | default .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: AGENT_ID
              value: "ui-test-agent-k8s-001"
            - name: AGENT_API_BASE_URL
              value: "http://{{ .Release.Name }}-backend:{{ .Values.backend.port }}"
            - name: AGENT_SELENIUM_URL
              value: "http://localhost:4444"
            - name: AGENT_POLL_INTERVAL
              value: "{{ .Values.uiTestAgent.pollInterval | default 30 }}"
            - name: AGENT_MAX_CONCURRENT_JOBS
              value: "{{ .Values.uiTestAgent.maxConcurrentJobs | default 2 }}"
            - name: AGENT_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: admin-username
            - name: AGENT_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: admin-password
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
