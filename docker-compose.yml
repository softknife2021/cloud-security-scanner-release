# PilotRelease Platform - Docker Compose
# Usage: docker-compose up -d
#
# Images pulled from Docker Hub: softknife/pilotrelease-*

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pilotrelease-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: security_agent
      POSTGRES_USER: secadmin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secpass123}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secadmin -d security_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pilotrelease-network

  # Backend API (Spring Boot)
  backend:
    image: softknife/pilotrelease-backend:latest
    container_name: pilotrelease-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/security_agent
      SPRING_DATASOURCE_USERNAME: secadmin
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-secpass123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      JWT_SECRET: ${JWT_SECRET:-MySecureJWTSecretKeyForProductionPleaseChangeThisToAStrongRandomValue}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      SERVER_PORT: 8080
      LOGGING_LEVEL_ROOT: ${LOG_LEVEL:-INFO}
      ELEMENT_PICKER_SELENIUM_URL: http://selenium-chrome:4444
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - pilotrelease-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend UI (React + nginx)
  ui:
    image: softknife/pilotrelease-ui:latest
    container_name: pilotrelease-ui
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${UI_PORT:-3000}:80"
    networks:
      - pilotrelease-network

  # Scanner Agent (Nmap, Nuclei, SQLMap, Nikto)
  scanner:
    image: softknife/pilotrelease-scanner:latest
    container_name: pilotrelease-scanner
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      AGENT_ID: scanner-agent-001
      API_BASE_URL: http://backend:8080
      POLL_INTERVAL: ${POLL_INTERVAL:-30}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-admin123}
      LOG_LEVEL: INFO
    networks:
      - pilotrelease-network

  # ZAP Scanner (OWASP ZAP DAST)
  scanner-zap:
    image: softknife/pilotrelease-scanner-zap:latest
    container_name: pilotrelease-scanner-zap
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      AGENT_ID: scanner-agent-zap-001
      API_BASE_URL: http://backend:8080
      POLL_INTERVAL: ${POLL_INTERVAL:-30}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-admin123}
    networks:
      - pilotrelease-network
    profiles:
      - scanner-zap

  # Performance Agent (Artillery)
  performance:
    image: softknife/pilotrelease-performance:latest
    container_name: pilotrelease-performance
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      AGENT_ID: scanner-agent-artillery-001
      API_BASE_URL: http://backend:8080
      POLL_INTERVAL: ${POLL_INTERVAL:-30}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-admin123}
    networks:
      - pilotrelease-network
    profiles:
      - performance

  # Selenium Chrome (for UI testing + Visual Picker)
  selenium-chrome:
    image: selenium/standalone-chrome:latest
    container_name: pilotrelease-selenium
    shm_size: '2g'
    ports:
      - "4444:4444"
      - "7900:7900"
    environment:
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
      - SE_SESSION_REQUEST_TIMEOUT=300
      - SE_NODE_SESSION_TIMEOUT=600
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - pilotrelease-network
    profiles:
      - ui-test

  # UI Test Agent (WebDriver browser automation)
  ui-test:
    image: softknife/pilotrelease-ui-test:latest
    container_name: pilotrelease-ui-test
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      selenium-chrome:
        condition: service_healthy
    environment:
      API_BASE_URL: http://backend:8080
      SELENIUM_URL: http://selenium-chrome:4444
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-admin123}
      MAX_CONCURRENT_JOBS: 2
    networks:
      - pilotrelease-network
    profiles:
      - ui-test

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: pilotrelease-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - pilotrelease-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - storage

volumes:
  postgres-data:
  minio-data:

networks:
  pilotrelease-network:
    driver: bridge
