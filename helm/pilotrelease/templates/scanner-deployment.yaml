apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-scanner
  labels:
    {{- include "cloud-security-scanner.labels" . | nindent 4 }}
    app.kubernetes.io/component: scanner
spec:
  replicas: {{ .Values.scanner.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: scanner
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: scanner
    spec:
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for backend to be ready..."
              until wget -q --spider http://{{ .Release.Name }}-backend:{{ .Values.backend.port }}/actuator/health 2>/dev/null; do
                sleep 5
              done
              echo "Backend is ready!"
      containers:
        - name: scanner
          image: "{{ .Values.scanner.image }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Obtaining JWT token..."
              export JWT_TOKEN=$(python3 -c "
              import urllib.request, json, os
              req = urllib.request.Request('http://{{ .Release.Name }}-backend:{{ .Values.backend.port }}/api/auth/login',
                  data=json.dumps({'username': os.environ['ADMIN_USERNAME'], 'password': os.environ['ADMIN_PASSWORD']}).encode(),
                  headers={'Content-Type':'application/json'})
              resp = urllib.request.urlopen(req)
              print(json.loads(resp.read())['token'])
              ")
              echo "Token obtained. Starting scanner agent..."
              exec python -u agent.py
          env:
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: admin-username
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: admin-password
            - name: AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: admin-username
            - name: AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: admin-password
            - name: AGENT_ID
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: AGENT_ID
            - name: API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: API_BASE_URL
            - name: POLL_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: POLL_INTERVAL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: LOG_LEVEL
            - name: S3_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: S3_ENABLED
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: S3_BUCKET
            - name: S3_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: S3_ENDPOINT
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: minio-root-user
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: minio-root-password
          resources:
            {{- toYaml .Values.scanner.resources | nindent 12 }}
